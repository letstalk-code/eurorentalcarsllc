<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="10" fill="#111111"/>
  <!-- Diamond shape (two triangles forming a diamond/rhombus) -->
  <!-- Upper triangle (top half of diamond) -->
  <polygon points="32,6 50,30 32,26 14,30" fill="#CDFF00"/>
  <!-- Lower triangle (bottom half of diamond) -->
  <polygon points="32,58 50,30 32,34 14,30" fill="#CDFF00"/>
  <!-- Horizontal line across the middle of diamond -->
  <line x1="18" y1="30" x2="46" y2="30" stroke="#111111" stroke-width="2.5"/>
</svg>
